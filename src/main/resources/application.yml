spring:
  application:
    name: rag-service
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: rag_user
    password: rag_password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: rag_password
      timeout: 3s
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    "[com.example.rag]": INFO

rag:
  id:
    worker-id: 1
    datacenter-id: 1
  storage:
    base-dir: ./data/uploads
    max-file-size-mb: 20
  executor:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100
    await-termination-seconds: 30
    thread-name-prefix: rag-indexing-
  chunking:
    strategy: fixed-window
    max-chunk-chars: 600
    overlap-chars: 80
    min-break-search-offset: 240
  embedding:
    provider: local-openai-compatible
    base-url: http://localhost:8001/v1
    api-key: ""
    model: bge-small-zh-v1.5
    vector-dimensions: 512
    embedding-path: /embeddings
    batch-size: 16
  llm:
    chat:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:change-me}
      model: deepseek-v4-pro
      chat-path: /chat/completions
      temperature: 0.2
      max-output-tokens: 1200
  retrieval:
    vector-store: pgvector
    default-top-k: 5
    max-top-k: 10
    max-context-chars: 6000
  qa:
    default-created-by: qa-service
    message-type: QA
    prompt-template: qa-default-v1
    session-name-max-length: 80
  indexing:
    max-retry-count: 3
    recovery:
      enabled: true
      stale-after-seconds: 600
      scan-limit: 20
