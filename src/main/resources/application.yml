spring:
  application:
    name: rag-service
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: rag_user
    password: rag_password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: rag_password
      timeout: 3s
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    "[com.example.rag]": INFO

rag:
  id:
    worker-id: 1
    datacenter-id: 1
  storage:
    base-dir: ./data/uploads
    max-file-size-mb: 20
  embedding:
    provider: local-openai-compatible
    base-url: http://localhost:8001/v1
    api-key: ""
    model: bge-small-zh-v1.5
    vector-dimensions: 512
    embedding-path: /embeddings
    batch-size: 16
  llm:
    chat:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:change-me}
      model: deepseek-v4-pro
      chat-path: /chat/completions
      temperature: 0.2
      max-output-tokens: 1200
  retrieval:
    vector-store: pgvector
    default-top-k: 5
    max-top-k: 10
    max-context-chars: 6000
