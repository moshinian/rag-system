spring:
  application:
    name: rag-service
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: rag_user
    password: rag_password
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
  data:
    redis:
      host: localhost
      port: 6379
      password: rag_password
      timeout: 3s
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    "[com.example.rag]": INFO

rag:
  storage:
    base-dir: ./data/uploads
    max-file-size-mb: 20
  embedding:
    provider: openai-compatible
    model: text-embedding-3-small
  llm:
    base-url: http://localhost:8000/v1
    api-key: change-me
    chat-model: gpt-4o-mini
